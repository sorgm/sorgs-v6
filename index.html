<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="d7ufTXK2lwvT5S9JJmFloyXXNGC2GJOL6e9-Pq4DqI0" />
    <meta name="viewport" content="width=device-width">
    <title>Die Sorg'sche Sammlung - sorgs.de</title>
</head>

<body>
    <h1>Die Sorg'sche Sammlung</h1>

    <!-- for dynamic content -->
    <div class="gallery"></div>
    <script type="module">
        import { events, sitemap, layout } from './main.js';
        layout.styleSheets.add("/index.css");

        // refresh dynamic content
        function refreshGallery() {
            const gallery = document.getElementsByClassName("gallery")[0];
            
            const all_styles = Array.from(new Set(Object.values(sitemap).map(e => e.style)));

            const params = new URLSearchParams(window.location.search);
            const filter_style = params.has("style") ? Array.from(params.getAll("style")) : all_styles;

            gallery.innerHTML = Object.values(sitemap).reduce((p, e) => {
                if (!filter_style.includes(e.style)) {
                    return p
                }
                var href=e.location.href
                if (e.location.hostname=="sorgs.de") {
                    href=e.location.pathname.slice(1)
                }
                if (e.imgsrc == undefined) {
                    return p + `<a href="${href}" class="${e.style}" title="${e.title}">
                <span class="title">${e.title}</span><br/>
                <span class="year">${new Date(e.lastmod).getFullYear()}</span></a>`
                }
                else {
                    return p + `<a href="${href}" class="${e.style}" title="${e.title}">
                <img src="${e.imgsrc.pathname.slice(1)}" title="${e.title}"><br/>
                <span class="title">${e.title}</span><br/>
                <span class="year">${new Date(e.lastmod).getFullYear()}</span></a>`
                }
            }, "");
        }

        events.get("sitemap_ready").addListener(refreshGallery);
    </script>
    <script type="text/strings" lang="en">
    HTML
      HEAD
        TITLE
          TEXT The Sorgs' Collection - sorgs.de
      BODY
        HEADER
          H1
            TEXT The Sorgs' Collection
    </script>
</body>

</html>
