name: Deploy to STRATO via SFTP

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SFTP (pure OpenSSH)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          mkdir -p ~/.ssh

          # Add STRATO host key
          ssh-keyscan -p $SFTP_PORT $SFTP_HOST >> ~/.ssh/known_hosts

          # Start SFTP session
          sftp -oBatchMode=no -P $SFTP_PORT $SFTP_USER@$SFTP_HOST <<EOF
          lcd .
          cd $SFTP_REMOTE_PATH
          put -r *
          bye
          EOF

