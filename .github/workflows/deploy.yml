name: Deploy to STRATO via SFTP

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SFTP (pure OpenSSH)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_HOST }}" >> ~/.ssh/known_hosts

          # Upload everything except ignored files
          sftp -P ${{ secrets.SFTP_PORT }} \
               ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} <<EOF
          lcd .
          cd ${{ secrets.SFTP_REMOTE_PATH }}
          put -r *
          bye
          EOF

