<body>
    <h1>Sudoku Solver (draft)</h1>
    <p>just type 81 digits and blanks</p>
    <textarea id="sudoku_input" columns="9" rows="9"></textarea>
    <button id="sudoku_solve">Solve</button>
    <input type="checkbox" id="allow_options" checked="checked" title="Allow options (aka pencil)" />
    <input type="checkbox" id="allow_brute_force" title="Allow brute force" />
    <button id="sudoku_clear">Clear</button>
    <button id="sudoku_random">Random</button>
    <input type="range" id="sudoku_random_difficulty" min="10" max="90" value="50" step="5" title="Difficulty for random preset" />
    <div id="sudoku_output"></div>
    <table id="sudoku_log"></table>
</body>

</html>
<style>
    #sudoku_input {
        font-family: monospace;
        font-size: 24px;
        line-height: 2ch;
        letter-spacing: 1ch;
        padding: 1ch 0.5ch 0.5ch 1ch;
        display: block;
        resize: none;
        aspect-ratio: 1 / 1;
        width: 21ch;
    }

    #sudoku_random_difficulty {
        width: 10ch;
    }

    #sudoku_log {
        border-collapse: collapse;
        position: absolute;
        top: 0em;
        left: 20em;
        border: 3em solid white;
        background-color: white;
    }

    #sudoku_log>tr {
        border: 1px solid grey;
    }

    #sudoku_log table.board {
        zoom: 50%;
    }

    table.board {
        font-family: monospace;
        font-size: 24px;
        margin: 0.5ch;
        border-collapse: collapse;
        border-top: 1px solid gray;
        border-left: 1px solid gray;
        text-align: center;
    }

    table.board>:nth-child(3n) {
        border-bottom: 1px solid gray;
    }

    table.board>tr>:nth-child(3n) {
        border-right: 1px solid gray;
    }

    table.board td {
        width: 2ch;
        height: 2ch;
        padding: 0;
    }

    table.board td small {
        font-size: small;
        width: 100%;
        word-break: keep-all;
        display: inline-block;
        background-color: whitesmoke;
        border: 1px solid cyan;
    }

    .highlight, table.board td.highlight small {
        background-color: yellow;
    }
</style>
<script type="module">
    import {Sudoku} from './sudoku.js'
//    import {LetterSudoku as Sudoku} from './sudoku.js'

    sudoku_solve.onclick = function () {
        sudoku_log.innerHTML = "";
        const s = new Sudoku();
        s.config.allow_options = allow_options.checked;
        s.config.allow_brute_force = allow_brute_force.checked;
        s.callback.step_performed.push(step_performed);
        s.performStep("init", sudoku_input.value);
        sudoku_input.value = s.toString();
        s.solve().catch(e => {
            s.log.push({type: 'error', reason: e.message,
                resultingCells: structuredClone(s.cells)
            });
            log(s,-1);
        });
    };
    sudoku_clear.onclick = function () {
        sudoku_input.value = "";
        sudoku_output.innerText = "";
        sudoku_log.innerHTML = "";
    };
    sudoku_random.onclick = async function () {
        sudoku_log.innerHTML = "";
        sudoku_output.innerText = "";

        //Sudoku.callback.step_performed.push(step_performed);
        sudoku_input.value = await Sudoku.randomPreset(sudoku_random_difficulty.value/100);
        //Sudoku.callback.step_performed.pop();
    };

    function step_performed(s) {
        sudoku_output.innerText = "";
        sudoku_output.appendChild(board_to_table(s, s.cells));

        log(s, -1)
    }

    function board_to_table(s, cells, highlightcellids) {
        if (!cells) return document.createTextNode("#N/A");
        const table = document.createElement("TABLE");
        table.classList.add("board");
        for (let row = 0; row < 9; row += 1) {
            let tr = document.createElement("TR");
            for (let col = 0; col < 9; col += 1) {
                let td = document.createElement("TD");
                let cellid = row * 9 + col;
                if (!!highlightcellids && highlightcellids.includes(cellid)) {
                    td.classList.add("highlight");
                }
                let cell = cells[row * 9 + col];
                if (cell.value != null) {
                    td.innerText = s.constructor.setup.digits[cell.value];
                }
                else if (cell.options == null) {
                    td.innerText = "_";
                }
                else {
                    let small = document.createElement("SMALL");
                    let opttext = '';
                    for(let option=0; option<9; option+=1) {
                        if (cell.options.includes(option)) {
                            opttext += s.constructor.setup.digits[option]
                        }
                        else {
                            opttext += '\u00A0'; // &nbsp;
                        }
                    }
                    small.appendChild(document.createTextNode(opttext.slice(0, 3)))
                    small.appendChild(document.createElement("BR"))
                    small.appendChild(document.createTextNode(opttext.slice(3, 6)))
                    small.appendChild(document.createElement("BR"))
                    small.appendChild(document.createTextNode(opttext.slice(6, 9)))
                    td.appendChild(small)
                }
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
        return table;
    }

    function log(s, at) {
        let logentry = s.log.at(at);
        let tr = document.createElement("TR");
        let td = document.createElement("TD");

        let logtext = `${logentry.reason??logentry.type}`;
        if (logentry.relatedDimension) {
            logtext += ` (${logentry.relatedDimension??''} ${logentry.relatedIds?.map(i=>s.constructor.setup.digits[i]).join(',')??''})`;  
        }
        if (logentry.type == 'remove' && logentry.option) {
            if (Array.isArray(logentry.option)) {
                logtext += ` - ${logentry.option.map(option => s.constructor.setup.digits[option]).join(",")}`;
            }
            else {
                logtext += `- ${s.constructor.setup.digits[option]}`
            }
        }
        td.appendChild(document.createTextNode(logtext));
        tr.appendChild(td);
        td = document.createElement("TD");
        td.appendChild(board_to_table(s, logentry.resultingCells, logentry.cellids));
        tr.appendChild(td);
        sudoku_log.appendChild(tr);
    }

</script>
